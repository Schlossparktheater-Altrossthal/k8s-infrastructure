apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: theater-website-staging-tls
  namespace: theater-website-staging
spec:
  secretName: theater-website-staging-tls
  issuerRef:
    name: cloudflare-letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - staging.sommertheater-altrossthal.de
  duration: 2160h
  renewBefore: 360h
