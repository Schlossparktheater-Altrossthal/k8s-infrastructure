apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-sync
  namespace: theater-website-staging
---
# Dedicated SecretStore for the sync job — uses a Vault role with read access to both
# apps/theater-website and apps/theater-website-staging so it can pull both DATABASE_URLs.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: db-sync-vault
  namespace: theater-website-staging
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: theater-db-sync-eso
          serviceAccountRef:
            name: db-sync
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-sync-credentials
  namespace: theater-website-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: db-sync-vault
  target:
    name: db-sync-credentials
    creationPolicy: Owner
  data:
    - secretKey: PROD_DATABASE_URL
      remoteRef:
        key: apps/theater-website
        property: DATABASE_URL
    - secretKey: STAGING_DATABASE_URL
      remoteRef:
        key: apps/theater-website-staging
        property: DATABASE_URL
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-sync
  namespace: theater-website-staging
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: db-sync
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -euc
                - |
                  echo "Starting production → staging DB sync…"
                  pg_dump --no-owner --no-acl --clean --if-exists "$PROD_DATABASE_URL" \
                    | psql "$STAGING_DATABASE_URL"
                  echo "Sync complete."
              env:
                - name: PROD_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: db-sync-credentials
                      key: PROD_DATABASE_URL
                - name: STAGING_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: db-sync-credentials
                      key: STAGING_DATABASE_URL
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
