apiVersion: v1
kind: ServiceAccount
metadata:
  name: theater-website-vault
  namespace: theater-website
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: theater-vault
  namespace: theater-website
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: theater-website-eso
          serviceAccountRef:
            name: theater-website-vault
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: theater-website-config
  namespace: theater-website
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: theater-vault
  target:
    name: theater-website-config
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: apps/theater-website
        property: DATABASE_URL
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: apps/theater-website
        property: POSTGRES_PASSWORD
    - secretKey: AUTH_SECRET
      remoteRef:
        key: apps/theater-website
        property: AUTH_SECRET
    - secretKey: REALTIME_AUTH_TOKEN
      remoteRef:
        key: apps/theater-website
        property: REALTIME_AUTH_TOKEN
    - secretKey: REALTIME_HANDSHAKE_SECRET
      remoteRef:
        key: apps/theater-website
        property: REALTIME_HANDSHAKE_SECRET
    - secretKey: EMAIL_SERVER
      remoteRef:
        key: apps/theater-website
        property: EMAIL_SERVER
    - secretKey: EMAIL_FROM
      remoteRef:
        key: apps/theater-website
        property: EMAIL_FROM
