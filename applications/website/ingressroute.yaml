apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: website
  namespace: website
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sommertheater-altrossthal.de`) || Host(`www.sommertheater-altrossthal.de`)
      kind: Rule
      services:
        - name: website
          port: 3000
  tls:
    certResolver: cloudflare
