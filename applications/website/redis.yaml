# Redis is used as the socket.io adapter backend so realtime events
# (rooms, broadcasts) work correctly across multiple website replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: theater-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 320Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: theater-website
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
