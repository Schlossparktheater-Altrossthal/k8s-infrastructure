apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: theater-website
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
        - name: website
          image: limitlessgreen/theater_website:prod
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXTAUTH_URL
              value: https://sommertheater-altrossthal.de
            - name: NEXT_PUBLIC_BASE_URL
              value: https://sommertheater-altrossthal.de
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: AUTH_SECRET
            - name: REALTIME_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: REALTIME_AUTH_TOKEN
            - name: REALTIME_HANDSHAKE_SECRET
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: REALTIME_HANDSHAKE_SECRET
            - name: EMAIL_SERVER
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: EMAIL_SERVER
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: EMAIL_FROM
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: theater-website
spec:
  selector:
    app: website
  ports:
    - port: 3000
      targetPort: 3000
