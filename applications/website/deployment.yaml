# Migration job runs as ArgoCD PreSync hook — completes before the Deployment rolls out.
# Image tag is updated automatically by GitHub Actions on every push to production.
apiVersion: batch/v1
kind: Job
metadata:
  name: website-migrate
  namespace: theater-website
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: limitlessgreen/theater_website:03a231f
          command: ["node", "scripts/run-prisma-migrate.mjs"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: theater-website
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
        - name: website
          image: limitlessgreen/theater_website:03a231f2e643802ac0d7863fb167d65810d75c32
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXTAUTH_URL
              value: https://sommertheater-altrossthal.de
            - name: NEXT_PUBLIC_BASE_URL
              value: https://sommertheater-altrossthal.de
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: AUTH_SECRET
            - name: REALTIME_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: REALTIME_AUTH_TOKEN
            - name: REALTIME_HANDSHAKE_SECRET
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: REALTIME_HANDSHAKE_SECRET
            - name: EMAIL_SERVER
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: EMAIL_SERVER
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: theater-website-config
                  key: EMAIL_FROM
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: theater-website
spec:
  selector:
    app: website
  ports:
    - port: 3000
      targetPort: 3000
