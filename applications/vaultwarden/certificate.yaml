apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: theater-vaultwarden-tls
  namespace: theater-vaultwarden
spec:
  secretName: theater-vaultwarden-tls
  issuerRef:
    name: cloudflare-letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - bitwarden.sommertheater-altrossthal.de
  duration: 2160h
  renewBefore: 360h
