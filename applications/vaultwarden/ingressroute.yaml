apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: theater-vaultwarden
  namespace: theater-vaultwarden
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`bitwarden.sommertheater-altrossthal.de`)
      kind: Rule
      services:
        - name: theater-vaultwarden
          port: 80
  tls:
    secretName: theater-vaultwarden-tls
