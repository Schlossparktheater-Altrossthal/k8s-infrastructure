apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: theater-vaultwarden
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: theater
  source:
    repoURL: https://github.com/Schlossparktheater-Altrossthal/k8s-infrastructure
    targetRevision: HEAD
    path: applications/vaultwarden
  destination:
    server: https://kubernetes.default.svc
    namespace: theater-vaultwarden
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      name: theater-vaultwarden-data
      namespace: theater-vaultwarden
      jsonPointers:
        - /spec/storageClassName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
