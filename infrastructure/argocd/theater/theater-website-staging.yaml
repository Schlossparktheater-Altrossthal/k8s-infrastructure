apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: theater-website-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: theater
  source:
    repoURL: https://github.com/Schlossparktheater-Altrossthal/k8s-infrastructure
    targetRevision: HEAD
    path: applications/website-staging
  destination:
    server: https://kubernetes.default.svc
    namespace: theater-website-staging
  ignoreDifferences:
    - kind: PersistentVolumeClaim
      name: data-postgresql-0
      namespace: theater-website-staging
      jsonPointers:
        - /spec/storageClassName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
