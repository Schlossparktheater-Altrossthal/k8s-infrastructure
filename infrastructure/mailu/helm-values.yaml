# Mailu Helm Values für K8s Migration
global:
  storageClass: longhorn-single

hostnames:
  - mail.sommertheater-altrossthal.de
domain: sommertheater-altrossthal.de
postmaster: admin
mailuVersion: "2024.06"
timezone: "Europe/Berlin"
subnet: 10.42.0.0/16
recipientDelimiter: "+"
credentialRounds: 12
sessionCookieSecure: true
logLevel: INFO

dmarc:
  rua: admin
  ruf: admin

limits:
  authRatelimit:
    ip: 5/hour
    user: 50/day
  messageRatelimit:
    value: 200/day
  messageSizeLimitMb: 50

# TLS: cert-manager Secret mailu-certificates wird in front-Pod als /certs/ gemountet
# tlsFlavor "mail" = TLS nur für Mail-Ports (SMTP/IMAP/POP3), Web-Interface plain HTTP
# Traefik übernimmt HTTPS-Terminierung für das Web-Interface via IngressRoute
ingress:
  enabled: false
  existingSecret: mailu-certificates
  tlsFlavorOverride: "mail"

# front: Mail-Ports direkt auf Node 2 via hostPort
# Recreate-Strategie nötig: Rolling Update scheitert, weil hostPorts nicht
# gleichzeitig von zwei Pods belegt werden können
front:
  nodeSelector:
    sommertheater: "true"
  hostPort:
    enabled: true
  strategy:
    type: Recreate

admin:
  enabled: true
  nodeSelector:
    sommertheater: "true"

api:
  enabled: true

antivirus:
  enabled: true

fetchmail:
  enabled: true
  delay: 600
  nodeSelector:
    sommertheater: "true"

fullTextSearch:
  enabled: true
  attachments: true

webmail:
  enabled: true
  type: roundcube
  nodeSelector:
    sommertheater: "true"

postfix:
  nodeSelector:
    sommertheater: "true"

dovecot:
  nodeSelector:
    sommertheater: "true"

rspamd:
  nodeSelector:
    sommertheater: "true"

clamav:
  nodeSelector:
    sommertheater: "true"

persistence:
  storageClass: longhorn

existingSecret: mailu-secrets
