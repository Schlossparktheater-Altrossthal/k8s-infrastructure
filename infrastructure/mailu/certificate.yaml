apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mailu-certificates
  namespace: mailu
spec:
  secretName: mailu-certificates
  issuerRef:
    name: cloudflare-letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - mail.sommertheater-altrossthal.de
    - webmail.sommertheater-altrossthal.de
  duration: 2160h
  renewBefore: 360h
